<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>html file loader</title>
    <!-- if you're reading this, someone from relic gave me their css-->
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="relic-logo-container">
    <img class="relic-logo-image" src="https://img.icons8.com/fluent/1200/thick-arrow-pointing-up.jpg" alt="relic logo">
    <h1 class="relic-title">html file loader</h1>
</div>

<div class="game-filters">
    <button class="filter-btn active" id="uploadFilterBtn">📁</button>
</div>

<div class="search-container">
    <input type="file" id="fileInput" accept=".html,.htm">
</div>

<div id="renderArea" class="content"></div>

<div class="homepage-info-buttons">
    <button class="info-btn" id="watermarkBtn">made by sphazelnut</button>
</div>

<script>
    (function() {
        const fileInput = document.getElementById('fileInput');
        const renderArea = document.getElementById('renderArea');

        fileInput.addEventListener('change', function(event) {
            const file = event.target.files[0];
          
            if (!file) {
                return;
            }
            if (!file.name.match(/\.(html|htm)$/i)) {
                renderArea.innerHTML = '<p style="color: darkred;">error code 1 — please upload an .html or .htm file</p>';
                return;
            }

            const reader = new FileReader();

            reader.onload = function(e) {
                const htmlContent = e.target.result;
                renderArea.innerHTML = htmlContent;
            };

            reader.onerror = function() {
                renderArea.innerHTML = '<p>error code 2 — failed to read file</p>';
            };
            reader.readAsText(file);
        });
    })();
</script>

</body>
</html>
